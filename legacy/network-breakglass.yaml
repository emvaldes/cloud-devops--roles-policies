---

AWSTemplateFormatVersion: "2010-09-09"
Description: Breakglass IAM role for emergency access to production network environments. High-risk, short-lived, federated-only.

Resources:

  NetworkBreakglassPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: NetworkBreakglassPolicy
      Description: Unrestricted access for emergency breakglass scenarios in production
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EmergencyAccess
            Effect: Allow
            Action: "*"
            Resource: "*"

  NetworkBreakglassRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NetworkBreakglassRole
      Description: Emergency access role for production network accounts, used only under strict auditing and review
      MaxSessionDuration: 300
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowFederatedOktaOnly
            Effect: Allow
            Principal:
              Federated: arn:aws:iam::*:saml-provider/Okta
            Action: sts:AssumeRoleWithSAML
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - !Ref NetworkBreakglassPolicy
      Tags:
        - Key: Purpose
          Value: BreakglassEmergency
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Role
          Value: network-breakglass
        - Key: Environment
          Value: production
        - Key: Classification
          Value: HighRisk

Outputs:

  NetworkBreakglassRoleArn:
    Value: !GetAtt NetworkBreakglassRole.Arn
    Description: ARN of the IAM role for breakglass production emergency use

  NetworkBreakglassPolicyArn:
    Value: !Ref NetworkBreakglassPolicy
    Description: ARN of the unrestricted managed policy for emergency use
